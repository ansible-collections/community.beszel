---
name: Tox Ansible
on:
  - pull_request
permissions:
  contents: read
jobs:
  generate-matrix:
    runs-on: ubuntu-latest
    outputs:
      envs: ${{ steps.matrix.outputs.envs }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version-file: pyproject.toml

      - name: Install uv
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7.6.0

      - name: Generate matrix
        id: matrix
        run: |
          MATRIX=$(uv run --no-dev --group test tox --ansible --conf tox-ansible.ini --gh-matrix | jq -c)
          echo "envs=${MATRIX}" >> "$GITHUB_OUTPUT"

  tox-ansible:
    needs: generate-matrix
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        entry: ${{ fromJSON(needs.generate-matrix.outputs.envs) }}
    steps:
      - name: Set up Docker Compose
        if: contains(matrix.entry.name, 'integration')
        uses: docker/setup-compose-action@8cccb8c14b6500aaffebff1aa49c502c34d2e5e6 # v2.1.0

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: ${{ matrix.entry.python }}

      - name: Install uv
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7.6.0

      - name: Run tox environment ${{ matrix.entry.name }}
        run: |
          uv run --no-dev --group test tox --ansible --conf tox-ansible.ini -e ${{ matrix.entry.name }}

  linters:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        env:
          - ruff
          - yamllint
          - flake8
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version-file: pyproject.toml

      - name: Install uv
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7.6.0

      - name: Set up Python environment
        run: uv sync --only-group test

      - name: Run ${{ matrix.env }}
        run: |
          uv run tox --conf tox-ansible.ini -e ${{ matrix.env }}
